name: CI

on: [push, pull_request]

jobs:
  build-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      # Package.swift needs swift-tools-version 6.0, but the runner's default Xcode is
      # Swift 5.10 — select the newest stable Xcode (16.x → Swift 6) explicitly so
      # `swift build`/`swift test` resolve the package instead of failing at manifest load.
      - name: Select Swift 6 toolchain
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Build (release)
        run: swift build -c release
      # Unit tests only (DateWindow, Renderer, CLIParsing, Auth, Serve). CI cannot grant
      # macOS Calendar (TCC) access, so there are no live EventKit reads here. These
      # suites also can't run on a Command Line Tools-only box (no XCTest); the Xcode
      # selected above provides it.
      - name: Test
        run: swift test
